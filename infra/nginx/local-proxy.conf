# Hostname-based reverse proxy for the local dev stack.
#
# Routes the Host header coming in on port 80 to the right compose service.
# Add the matching /etc/hosts entries on the host so the names actually resolve:
#
#   127.0.0.1 trendburada.local seller.trendburada.local admin.trendburada.local api.trendburada.local
#
# Without those, the names won't resolve and the browser will never reach this
# proxy. The proxy itself only does Host -> upstream fan-out; it doesn't rewrite
# paths. Compose internal DNS lets it reach `web` and `gateway` by service name.
#
# A separate, standalone proxy compose still lives at
# services/fe/infra/local-proxy/ for the "FE running on host via npm start"
# workflow; that one targets host.docker.internal:3000 instead.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name trendburada.local seller.trendburada.local admin.trendburada.local;

    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name api.trendburada.local;

    location / {
        proxy_pass http://gateway:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
