services:
  config-server:
    build:
      context: ../../trend-burada-config-server
      dockerfile: Dockerfile
    container_name: trend-burada-config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
    ports:
      - "8888:8888"

  gateway:
    build:
      context: ../../trend-burada-gateway
      dockerfile: Dockerfile
    container_name: trend-burada-gateway
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8090:8090"
    depends_on:
      - config-server
      - app
      - redis

  postgres-app:
    image: postgres:16
    container_name: trend-burada-postgres-app
    environment:
      POSTGRES_DB: trend_burada_app
      POSTGRES_USER: trend
      POSTGRES_PASSWORD: trend
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data

  postgres-keycloak:
    image: postgres:16
    container_name: trend-burada-postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: trend-burada-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/trend-burada-realm.json:/opt/keycloak/data/import/trend-burada-realm.json:ro
    depends_on:
      - postgres-keycloak

  mailpit:
    image: axllent/mailpit:latest
    container_name: trend-burada-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7
    container_name: trend-burada-redis
    ports:
      - "6379:6379"

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: trend-burada-app
    env_file:
      - .env
    environment:
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI:-http://config-server:8888}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      AUTH_VERIFICATION_SENDER_NAME: ${AUTH_VERIFICATION_SENDER_NAME}
      AUTH_VERIFICATION_SENDER_EMAIL: ${AUTH_VERIFICATION_SENDER_EMAIL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    depends_on:
      - config-server
      - postgres-app
      - keycloak
      - mailpit


volumes:
  postgres_app_data:
  postgres_keycloak_data:
